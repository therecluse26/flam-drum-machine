# ============================================================================
# MuldjordKit (FreePats edition) — FlamKit kit definition
# ============================================================================
name: "MuldjordKit"
author: "Lars Muldjord (recorded 2009–2010, Sepulchrum sessions); FreePats stereo edition assembled by Roberto (roberto@zenvoid.org)"
description: >-
  Acoustic rock/metal drum kit — Tama Superstar, sampled by Lars Muldjord and
  released through the DrumGizmo project. This is the FreePats stereo edition:
  2 kicks, 1 snare (+ rest/cross-stick), 4 toms, hi-hat (open/closed), 2 crashes,
  2 rides (+ bells) and a china, with deep velocity layering and random
  round-robin. Licensed CC-BY 4.0 — attribution REQUIRED (see LICENSE.txt).
version: "1.0"
license: CC-BY-4.0
siteUrl: https://freepats.zenvoid.org/Percussion/acoustic-drum-kit.html
sampleRate: 44100
bitDepth: 24
tags: ["acoustic", "rock", "metal", "stereo", "tama"]

# ============================================================================
# LICENSE / PROVENANCE  (CC-BY 4.0 — attribution REQUIRED)
# ============================================================================
# Kit:          MuldjordKit — FreePats stereo edition (version 2020-10-18),
#               derived from the original 16-channel DrumGizmo MuldjordKit v3.0.
# Instrument:   Tama Superstar acoustic kit (2 kicks, 3 rack toms, 1 floor tom,
#               snare, hi-hat, 2 crashes, 2 rides, china).
# Source:       FreePats — https://freepats.zenvoid.org/Percussion/acoustic-drum-kit.html
#               Upstream repo: https://github.com/freepats/muldjordkit (LICENSE: CC-BY-4.0)
#               Original kit:  DrumGizmo — https://drumgizmo.org/  (www.muldjord.com)
# Creator:      Lars Muldjord (recording, sampling, editing). FreePats stereo
#               downmix assembled by Roberto (roberto@zenvoid.org).
# License:      Creative Commons Attribution 4.0 International (CC-BY 4.0)
#               https://creativecommons.org/licenses/by/4.0/
# REQUIRED ATTRIBUTION (must be displayed to end users — FreePats terms, since 2021-01):
#   "Drum samples provided by DrumGizmo.org."
#   Recommended fuller credit:
#   "MuldjordKit by Lars Muldjord / the DrumGizmo project (drumgizmo.org),
#    FreePats edition, licensed under CC-BY 4.0."
# Modifications: Repackaged from the FreePats SFZ into flamkit.yaml; sample paths
#               point at the FreePats SFZ+WAV distribution. Audio samples unmodified.
# Redistribution: PERMITTED with attribution. Commercial use PERMITTED. No NC/ND.
# Full attribution text & provenance: see LICENSE.txt in this directory.

# ============================================================================
# CHANNEL DEFINITIONS  (stereo — 2 channels)
# ============================================================================
# The FreePats edition is a pre-mixed STEREO kit (the original DrumGizmo release
# provides 16 individually-routable mic channels). All sample WAVs are 2-channel.
channels:
  - name: "Left"
    index: 0
  - name: "Right"
    index: 1

# ============================================================================
# GLOBAL SETTINGS
# ============================================================================
settings:
  masterGain: 1.0
  maxPolyphony: 64
  useRoundRobin: true
  defaultHumanization: 0.1

