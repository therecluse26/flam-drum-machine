# ========================================
# MICROPHONE CHANNEL DEFINITIONS
# ========================================
# CRITICAL: These channel names and indices define the mixer layout in FlamKit.
# All WAV files in this kit MUST have exactly 13 channels matching this configuration.
# The order here (index 0-12) corresponds directly to the channel order in the WAV files.
#
# Channel Naming Convention:
#   - Close mics: Individual drum piece microphones for isolated sound
#   - Overhead (OH): Stereo pair capturing cymbals and overall kit sound
#   - Room: Stereo pair capturing ambient/room sound for natural depth
#   - Ambient: Additional room capture for extended reverb/space
#
# Usage in FlamKit:
#   - Each channel becomes a labeled strip in the Per-Channel Mixer
#   - Users can route each channel to Main Mix or individual DAW output buses
#   - Enables professional multi-mic mixing workflow
channels:
  - name: "Kick In"        # Close mic inside kick drum (beater attack)
    index: 0
  - name: "Kick Out"       # Close mic outside kick drum (resonance/body)
    index: 1
  - name: "Snare Top"      # Close mic on snare drum batter head
    index: 2
  - name: "Snare Btm"      # Close mic under snare (snare wire response)
    index: 3
  - name: "HH Close"       # Close mic on hi-hat
    index: 4
  - name: "Tom 1"          # Close mic on high tom
    index: 5
  - name: "Tom 2"          # Close mic on mid tom
    index: 6
  - name: "Tom 3"          # Close mic on floor tom
    index: 7
  - name: "Ride"           # Close mic on ride cymbal
    index: 8
  - name: "OH-L"           # Overhead left (stereo pair - captures cymbals)
    index: 9
  - name: "OH-R"           # Overhead right (stereo pair)
    index: 10
  - name: "Room-L"         # Room mic left (stereo pair - ambient/natural reverb)
    index: 11
  - name: "Room-R"         # Room mic right (stereo pair)
    index: 12

settings:
  maxPolyphony: 64
  useRoundRobin: true

