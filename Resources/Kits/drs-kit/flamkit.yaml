name: "DRSKit"
author: "DrumGizmo project & DRSDrums (Jes Eiler); recorded by Deva & Lars Muldjord"
description: >-
  Multi-sampled acoustic drum kit (13-channel multi-mic) with extensive velocity
  layers and articulations. From jazz to rock. Source: DrumGizmo DRSKit v2.1.
  Licensed CC-BY 4.0 — see LICENSE.txt. © DrumGizmo project (drumgizmo.org).
version: "1.0"
sampleRate: 44100
bitDepth: 32  # IEEE Float
tags: ["acoustic", "rock", "jazz", "multi-channel"]

