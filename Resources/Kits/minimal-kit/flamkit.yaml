# FLAM Kit - Example Rock/Pop Kit
# Based on General MIDI Drum Map

name: "Minimal Kit"
author: "FLAM Project"
version: "1.0.0"
description: "Multi-sampled drum kit with round-robin layers"
coverImage: "cover.png"
tags: ["rock", "pop", "studio"]

# Channel definitions (stereo samples)
channels:
  - name: "Left"
  - name: "Right"

# Global kit settings
settings:
  masterGain: 1.0
  maxPolyphony: 64
  useRoundRobin: true
  defaultHumanization: 0.1

# Drum pieces mapped to General MIDI standard
pieces:
  # ===== KICK DRUM (MIDI Note 36) =====
  - name: "Kick"
    midiNote: 36  # C1
    articulations:
      - name: "Hit"
        chokeGroup: -1
        attackTime: 0.001
        holdTime: 0.0
        decayTime: 0.5
        sustainLevel: 0.0
        releaseTime: 0.1
        layers:
          - sampleFile: "samples/Kick/RD_K_1.wav"
            velocityMin: 0.0
            velocityMax: 1.0
            gain: 1.0
            roundRobinGroup: 0
          - sampleFile: "samples/Kick/RD_K_2.wav"
            velocityMin: 0.0
            velocityMax: 1.0
            gain: 1.0
            roundRobinGroup: 1
          - sampleFile: "samples/Kick/RD_K_3.wav"
            velocityMin: 0.0
            velocityMax: 1.0
            gain: 1.0
            roundRobinGroup: 2
